<svg width="100%" height="100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="meteorGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100" fill="#0d1117"/>
  <g>
    <circle cx="0" cy="0" r="0"/>
    <line x1="0" y1="0" x2="60" y2="30" stroke="url(#meteorGradient)" stroke-width="2">
      <animate attributeName="x1" values="-100;110%" dur="3s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="y1" values="-100;80" dur="3s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="-40;1200" dur="3s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="-70;110" dur="3s" begin="0s" repeatCount="indefinite"/>
    </line>
    <circle cx="0" cy="0" r="2" fill="#ffffff">
      <animate attributeName="cx" values="-100;110%" dur="3s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="-100;80" dur="3s" begin="0s" repeatCount="indefinite"/>
    </circle>
    
    <line x1="0" y1="0" x2="60" y2="30" stroke="url(#meteorGradient)" stroke-width="1.5">
      <animate attributeName="x1" values="-100;110%" dur="4s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="y1" values="-50;100" dur="4s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="-40;1200" dur="4s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="-20;130" dur="4s" begin="1.5s" repeatCount="indefinite"/>
    </line>
    <circle cx="0" cy="0" r="1.5" fill="#f9e25c">
      <animate attributeName="cx" values="-100;110%" dur="4s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="-50;100" dur="4s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
